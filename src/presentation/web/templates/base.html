<!doctype html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>{% block title %}GPA Calculator{% endblock %}</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <script src="https://unpkg.com/lucide@latest"></script>
        {% block extra_head %}{% endblock %}
    </head>
    <body class="bg-gray-50 font-sans flex h-screen overflow-hidden">
        <!-- Sidebar -->
        <aside
            class="w-64 bg-slate-900 text-slate-100 flex flex-col justify-between h-full border-r border-slate-800 flex-shrink-0">
            <div class="p-6">
                <a
                    href="/"
                    class="flex items-center gap-3 mb-8 hover:opacity-90 transition">
                    <i
                        data-lucide="graduation-cap"
                        class="text-indigo-400 w-8 h-8"></i>
                    <h1 class="text-xl font-bold tracking-wide">GPA Calc</h1>
                </a>

                <nav class="space-y-2">
                    <a
                        href="/students"
                        class="flex items-center gap-3 px-4 py-3 rounded-lg font-medium transition {% if request.path.startswith('/students') %}bg-indigo-600 text-white{% else %}text-slate-400 hover:bg-slate-800 hover:text-slate-100{% endif %}">
                        <i data-lucide="users" class="w-5 h-5"></i>
                        <span>Estudantes</span>
                    </a>
                    <a
                        href="/courses"
                        class="flex items-center gap-3 px-4 py-3 rounded-lg font-medium transition {% if request.path.startswith('/courses') %}bg-indigo-600 text-white{% else %}text-slate-400 hover:bg-slate-800 hover:text-slate-100{% endif %}">
                        <i data-lucide="book-open" class="w-5 h-5"></i>
                        <span>Cursos</span>
                    </a>
                </nav>
            </div>

            <div
                class="p-4 border-t border-slate-800 text-sm text-slate-500 flex items-center gap-2">
                <i data-lucide="terminal" class="w-4 h-4"></i>
                <span
                    >{% block footer_text %}Projeto de Linguagem de Programação
                    I{% endblock %}</span
                >
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 flex flex-col h-full overflow-y-auto p-8">
            {% block content %}
            <!-- Conteúdo específico de cada página -->
            {% endblock %}
        </main>

        <script>
            lucide.createIcons()
            {% block extra_scripts %}{% endblock %}
        </script>
    </body>
</html>
