<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>404 - Página Não Encontrada</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-900 text-slate-100 flex flex-col items-center justify-center h-screen font-sans">
    <div class="text-center p-6 max-w-md">
        <div class="bg-red-500/10 text-red-400 p-4 rounded-full w-20 h-20 flex items-center justify-center mx-auto mb-6 border border-red-500/20">
            <i data-lucide="shield-alert" class="w-10 h-10"></i>
        </div>
        <h1 class="text-6xl font-black text-white tracking-tight mb-2">404</h1>
        <h2 class="text-xl font-bold text-slate-200 mb-4">Página Não Encontrada</h2>
        <p class="text-slate-400 text-sm mb-8 leading-relaxed">
            O caminho que você tentou acessar não existe ou foi movido para outro local no sistema do GPA Calculator.
        </p>
        <a href="/" class="bg-indigo-600 hover:bg-indigo-700 text-white font-medium px-6 py-3 rounded-lg shadow-lg shadow-indigo-600/20 inline-flex items-center gap-2 transition">
            <i data-lucide="arrow-left" class="w-4 h-4"></i>
            Voltar para a Home
        </a>
    </div>
    <script>lucide.createIcons();</script>
</body>
</html>
